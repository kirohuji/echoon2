services:
  db:
    image: postgres:16-alpine
    container_name: echoon2-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-echoon2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echoon2}
      POSTGRES_DB: ${POSTGRES_DB:-echoon2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-echoon2} -d ${POSTGRES_DB:-echoon2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: echoon2-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-echoon2}:${POSTGRES_PASSWORD:-echoon2}@db:5432/${POSTGRES_DB:-echoon2}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1/guide-exam
    container_name: echoon2-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
