name: Deploy via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Validate deployment host variable
        run: |
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing vars.DEPLOY_HOST"
            exit 1
          fi

      - name: Deploy on target server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${DEPLOY_PATH:-/opt/echoon2}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            cat > .env <<EOF
            DEPLOY_HOST=${DEPLOY_HOST}
            FRONTEND_URL=${FRONTEND_URL:-https://${DEPLOY_HOST}}
            POSTGRES_USER=${POSTGRES_USER:-echoon2}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB:-echoon2}
            EOF

            docker compose --env-file .env pull || true
            docker compose --env-file .env up -d --build
            docker image prune -f
