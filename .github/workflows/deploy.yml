name: Deploy on Self-Hosted Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      WHISPER_INFERENCE_URL: ${{ secrets.WHISPER_INFERENCE_URL }}
      WHISPER_LANGUAGE: ${{ secrets.WHISPER_LANGUAGE }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with local self-hosted runner
        run: |
          set -euo pipefail
          docker compose up -d --build

      - name: Seed database when empty
        run: |
          set -euo pipefail
          RECORD_COUNT=$(docker compose exec -T backend node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); prisma.questionBank.count().then((count) => { console.log(count); }).catch((err) => { console.error(err); process.exit(1); }).finally(() => prisma.\$disconnect());" | awk 'END{print}' | tr -d '[:space:]')
          if [ "${RECORD_COUNT}" = "0" ]; then
            echo "Database is empty, running seed..."
            docker compose exec -T backend pnpm --filter @echoon2/backend prisma:seed
          else
            echo "Database already initialized, skip seed. questionBank count=${RECORD_COUNT}"
          fi

      - name: Cleanup dangling images
        run: |
          set -euo pipefail
          docker image prune -f
